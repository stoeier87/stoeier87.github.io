<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Scoreboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>🕹️ Arcade Scoreboard</h1>
        <p class="sub">Live top 10 per game</p>
      </header>

      <section class="content">
        <div class="panel">
          <h2>Submit score</h2>
          <form id="scoreForm">
            <div class="form-group">
              <label for="game">Game</label>
              <select id="game" name="game" required></select>
            </div>
            <div class="form-group">
              <label for="name">Name</label>
              <input
                id="name"
                type="text"
                maxlength="20"
                placeholder="Player name"
                label="Player name"
                required
              />
            </div>
            <div class="form-group">
              <label for="score">Score</label>
              <input
                id="score"
                type="number"
                min="0"
                max="9999999"
                autocomplete="off"
                placeholder="Score"
                required
              />
            </div>
            <div class="form-group">
              <label for="save" class="aria-hidden" aria-hidden="true"
                >&nbsp;</label
              >
              <button name="save" type="submit">Save</button>
            </div>
          </form>
          <div id="msg" class="msg"></div>
          <div class="tiny">Tip: Keep names short and fun (max 20 chars).</div>
        </div>

        <div class="panel">
          <h2>
            Leaderboard: <span id="currentGameLabel" class="game-title"></span>
          </h2>
          <table>
            <thead>
              <tr>
                <th class="rank">#</th>
                <th>Name</th>
                <th class="score">Score</th>
              </tr>
            </thead>
            <tbody id="boardBody">
              <tr>
                <td colspan="3">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer>
        <a href="../index.html">← Back to homepage</a>
      </footer>
    </main>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./scoreboard.js"></script>
  </body>
</html>
