<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Fullerton Støier — Principal Digital Strategist</title>
    <meta name="description" content="Tobias Fullerton Støier — Principal Digital Strategist">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1424;
            --ink: #ffffff;
            --red: #e03a2f;
            --ink-muted: rgba(255, 255, 255, 0.6);
            --ink-dim: rgba(255, 255, 255, 0.35);
            --mono: 'Space Mono', ui-monospace, monospace;
            --display: 'Archivo Black', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--ink);
            overflow-x: hidden;
        }

        /* UFO-cursor: aktiveres kun via JS paa fine pointers uden reduced motion */
        html.ufo-on, html.ufo-on a { cursor: none; }

        .ufo {
            position: fixed;
            left: 0; top: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            will-change: transform;
        }
        html.ufo-on .ufo.live { opacity: 1; }

        .ufo .beam {
            position: absolute;
            left: 50%;
            top: 22px;
            width: 0; height: 0;
            transform: translateX(-50%);
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 34px solid rgba(224, 58, 47, 0.28);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .ufo.zap .beam { opacity: 1; }

        .ufo .light { animation: ufolight 0.9s linear infinite; }
        .ufo .light:nth-child(2) { animation-delay: 0.3s; }
        .ufo .light:nth-child(3) { animation-delay: 0.6s; }

        @keyframes ufolight {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Subtil dot-grid over starfield, under indhold */
        .dotgrid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 1;
        }

        #starfield {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* ---- Topbar ---- */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.6em;
            flex-wrap: wrap;
            padding: 1.1rem 1.25rem;
            font-size: clamp(0.6rem, 1.6vw, 0.72rem);
            letter-spacing: 0.14em;
            text-align: center;
            background: linear-gradient(to bottom, var(--bg) 20%, transparent);
        }

        .topbar .label { color: var(--ink-muted); }
        .topbar .label::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--red);
            margin-right: 0.6em;
            vertical-align: 6%;
            animation: pulse 1.6s ease-in-out infinite;
        }
        .topbar .value { color: var(--red); font-weight: 700; }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
            50% { opacity: 0.35; box-shadow: none; }
        }

        /* ---- Scroll-rejsen ---- */
        .journey {
            position: relative;
            height: 650vh;
            z-index: 2;
        }

        .stage {
            position: sticky;
            top: 0;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .name {
            font-family: var(--display);
            text-transform: uppercase;
            text-align: center;
            line-height: 0.92;
            letter-spacing: -0.02em;
            font-size: clamp(2.6rem, 12vw, 10.5rem);
        }

        .name .word { display: block; white-space: nowrap; }
        .name .word.red { color: var(--red); }

        /* Ordene i rejsen er skjult til JS har splittet dem i bogstaver,
           saa navnet aldrig staar statisk fra start */
        html.js-anim #stageName .word { visibility: hidden; }

        .stage .word .ltr {
            display: inline-block;
            opacity: 0;
            will-change: transform, opacity;
        }

        .hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--ink-dim);
            transition: opacity 0.4s ease;
        }
        .hint .arrow { color: var(--red); }

        /* ---- Slutsektion ---- */
        .finale {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(2.5rem, 6vh, 4.5rem);
            padding: 6rem 1.25rem 4rem;
        }

        /* Finalen toner foerst frem naar den scrolles ind, saa den ikke
           foeles som en statisk dublet af rejsen */
        html.js-anim .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        html.js-anim .pills.reveal { transition-delay: 0.15s; }
        html.js-anim .reveal.in {
            opacity: 1;
            transform: none;
        }

        .pills {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            max-width: 60rem;
        }

        .pill {
            display: inline-block;
            font-family: var(--mono);
            font-size: clamp(0.7rem, 1.8vw, 0.85rem);
            letter-spacing: 0.08em;
            color: var(--ink);
            text-decoration: none;
            padding: 0.85rem 1.4rem;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 100px;
            background: rgba(13, 20, 36, 0.6);
            transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
            animation: float 5s ease-in-out infinite;
        }

        .pills li:nth-child(2) .pill { animation-delay: -1.1s; }
        .pills li:nth-child(3) .pill { animation-delay: -2.3s; }
        .pills li:nth-child(4) .pill { animation-delay: -3.2s; }
        .pills li:nth-child(5) .pill { animation-delay: -4.1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .pill:hover {
            border-color: var(--red);
            background: rgba(224, 58, 47, 0.12);
        }

        .pill:focus-visible {
            outline: 2px solid var(--red);
            outline-offset: 4px;
            border-color: var(--red);
        }

        .pill .arrow { color: var(--red); margin-right: 0.4em; }

        /* ---- Footer ---- */
        footer {
            position: relative;
            z-index: 2;
            padding: 2rem 1.25rem 2.5rem;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-dim);
        }

        footer a {
            color: inherit;
            text-decoration: none;
        }
        footer a:hover { color: var(--ink-muted); }
        footer a:focus-visible {
            outline: 2px solid var(--red);
            outline-offset: 4px;
        }

        /* ---- Reduced motion: alt statisk ---- */
        @media (prefers-reduced-motion: reduce) {
            .journey { display: none; }
            .pill { animation: none; }
            .topbar .label::before { animation: none; }
        }

        @media (max-width: 600px) {
            .name { letter-spacing: -0.01em; }
            .pills { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="dotgrid" aria-hidden="true"></div>

    <div class="ufo" id="ufo" aria-hidden="true">
        <div class="beam"></div>
        <svg width="48" height="34" viewBox="0 0 48 34" fill="none">
            <defs>
                <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="rgba(200,230,255,0.85)"/>
                    <stop offset="1" stop-color="rgba(120,170,220,0.35)"/>
                </linearGradient>
                <linearGradient id="saucer" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#e8edf5"/>
                    <stop offset="0.55" stop-color="#9aa7bd"/>
                    <stop offset="1" stop-color="#5c6a85"/>
                </linearGradient>
            </defs>
            <ellipse cx="24" cy="12" rx="9" ry="8.5" fill="url(#dome)"/>
            <ellipse cx="24" cy="18.5" rx="21" ry="7.5" fill="url(#saucer)"/>
            <circle class="light" cx="10" cy="21" r="2" fill="#e03a2f"/>
            <circle class="light" cx="24" cy="23" r="2" fill="#e03a2f"/>
            <circle class="light" cx="38" cy="21" r="2" fill="#e03a2f"/>
        </svg>
    </div>

    <header class="topbar">
        <span class="label">Current situation:</span>
        <span class="value">Principal Digital Strategist at Comwell Hotels</span>
    </header>

    <main>
        <!-- Scroll-rejsen: dekorativ duplikat af navnet, bogstaver flyver ind -->
        <div class="journey" aria-hidden="true">
            <div class="stage">
                <div class="name" id="stageName">
                    <span class="word" data-word="0">TOBIAS</span>
                    <span class="word red" data-word="1">FULLERTON</span>
                    <span class="word" data-word="2">STØIER</span>
                </div>
                <p class="hint" id="hint"><span class="arrow">↓</span> Scroll</p>
            </div>
        </div>

        <!-- Slutsektion: navnet samlet + kontakt -->
        <section class="finale">
            <h1 class="name reveal">
                <span class="word">TOBIAS</span>
                <span class="word red">FULLERTON</span>
                <span class="word">STØIER</span>
            </h1>
            <ul class="pills reveal">
                <li><a class="pill" href="mailto:tobias@stoeier.dk"><span class="arrow">→</span>tobias@stoeier.dk</a></li>
                <li><a class="pill" href="https://dk.linkedin.com/in/stoeier" target="_blank" rel="noopener"><span class="arrow">→</span>LinkedIn</a></li>
                <li><a class="pill" href="https://instagram.com/stoeier" target="_blank" rel="noopener"><span class="arrow">→</span>Instagram</a></li>
                <li><a class="pill" href="https://x.com/stoeier" target="_blank" rel="noopener"><span class="arrow">→</span>X</a></li>
                <li><a class="pill" href="https://open.spotify.com/artist/1OrUsE9Nua3bqJKM6lPnDW" target="_blank" rel="noopener"><span class="arrow">→</span>Spotify</a></li>
            </ul>
        </section>
    </main>

    <footer>
        <a href="https://servicedesign.dk" target="_blank" rel="noopener">servicedesign.dk</a>
    </footer>

    <script>
    (function () {
        'use strict';

        var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reduced) document.documentElement.classList.add('js-anim');

        /* ============ Starfield ============ */
        var canvas = document.getElementById('starfield');
        var ctx = canvas.getContext('2d');
        var W = 0, H = 0, dpr = 1;
        var layers = [];
        var LAYER_DEFS = [
            { density: 22000, sizeMin: 0.5, sizeMax: 1.0, parallax: 0.12, alpha: 0.5 },
            { density: 14000, sizeMin: 1.0, sizeMax: 1.7, parallax: 0.30, alpha: 0.7 },
            { density: 26000, sizeMin: 1.7, sizeMax: 2.5, parallax: 0.55, alpha: 0.9 }
        ];

        // Deterministisk pseudo-random (stabil på tværs af resize/frames)
        function rand(seed) {
            var x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
            return x - Math.floor(x);
        }

        function buildStars() {
            layers = LAYER_DEFS.map(function (def, li) {
                var count = Math.max(20, Math.round((W * H) / def.density));
                var stars = [];
                for (var i = 0; i < count; i++) {
                    var s = li * 10000 + i * 7;
                    stars.push({
                        x: rand(s + 1) * W,
                        y: rand(s + 2) * H,
                        r: def.sizeMin + rand(s + 3) * (def.sizeMax - def.sizeMin),
                        phase: rand(s + 4) * Math.PI * 2,
                        speed: 0.5 + rand(s + 5) * 1.2
                    });
                }
                return { def: def, stars: stars };
            });
        }

        /* ============ Planeter ============ */
        // r = andel af vmin, s0 = hvor paa rejsen planeten passerer midten,
        // px = vandret position (andel af W), pf = parallax-dybde
        var PLANETS = [
            { name: 'MERKUR',  r: 0.020, s0: 0.06, px: 0.80, pf: 0.42, hi: '#b8b0a8', lo: '#5c554e' },
            { name: 'VENUS',   r: 0.034, s0: 0.16, px: 0.16, pf: 0.50, hi: '#e8cfa0', lo: '#a67c48' },
            { name: 'JORDEN',  r: 0.040, s0: 0.27, px: 0.83, pf: 0.58, hi: '#6fb6e8', lo: '#1c4e8a', earth: true },
            { name: 'MARS',    r: 0.028, s0: 0.38, px: 0.14, pf: 0.46, hi: '#e0704a', lo: '#8a3520' },
            { name: 'JUPITER', r: 0.105, s0: 0.52, px: 0.85, pf: 0.62, hi: '#d9b48a', lo: '#8a6238', bands: true },
            { name: 'SATURN',  r: 0.080, s0: 0.67, px: 0.16, pf: 0.55, hi: '#e3c68f', lo: '#9c7a48', ring: true },
            { name: 'URANUS',  r: 0.042, s0: 0.80, px: 0.82, pf: 0.48, hi: '#a8e0e8', lo: '#4a98a8' },
            { name: 'NEPTUN',  r: 0.046, s0: 0.92, px: 0.15, pf: 0.60, hi: '#6a8ce8', lo: '#2a3f9c' }
        ];

        function drawPlanet(p, x, y, r) {
            // Svag glow
            var glow = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2);
            glow.addColorStop(0, 'rgba(255,255,255,0.06)');
            glow.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, r * 2, 0, 6.2832);
            ctx.fill();

            // Saturns ring: bagerste halvdel foerst
            if (p.ring) {
                ctx.strokeStyle = 'rgba(214, 194, 150, 0.55)';
                ctx.lineWidth = r * 0.30;
                ctx.beginPath();
                ctx.ellipse(x, y, r * 1.75, r * 0.55, -0.32, Math.PI, 6.2832);
                ctx.stroke();
            }

            // Kroppen med lys fra oeverste venstre
            var body = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.1, x, y, r * 1.05);
            body.addColorStop(0, p.hi);
            body.addColorStop(1, p.lo);
            ctx.fillStyle = body;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, 6.2832);
            ctx.fill();

            if (p.bands || p.earth) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, r, 0, 6.2832);
                ctx.clip();
                if (p.bands) {
                    // Jupiters striber
                    ctx.fillStyle = 'rgba(110, 74, 44, 0.35)';
                    ctx.fillRect(x - r, y - r * 0.52, r * 2, r * 0.18);
                    ctx.fillRect(x - r, y - r * 0.10, r * 2, r * 0.22);
                    ctx.fillRect(x - r, y + r * 0.38, r * 2, r * 0.15);
                    // Den store roede plet
                    ctx.fillStyle = 'rgba(200, 90, 60, 0.75)';
                    ctx.beginPath();
                    ctx.ellipse(x + r * 0.35, y + r * 0.24, r * 0.18, r * 0.11, 0, 0, 6.2832);
                    ctx.fill();
                }
                if (p.earth) {
                    // Stiliserede kontinenter + polarkappe
                    ctx.fillStyle = 'rgba(76, 156, 94, 0.85)';
                    ctx.beginPath();
                    ctx.ellipse(x - r * 0.30, y - r * 0.15, r * 0.42, r * 0.30, 0.5, 0, 6.2832);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + r * 0.42, y + r * 0.35, r * 0.28, r * 0.20, -0.4, 0, 6.2832);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.beginPath();
                    ctx.ellipse(x + r * 0.1, y - r * 0.8, r * 0.35, r * 0.18, 0, 0, 6.2832);
                    ctx.fill();
                }
                ctx.restore();
            }

            // Ringens forreste halvdel over kroppen
            if (p.ring) {
                ctx.strokeStyle = 'rgba(224, 204, 160, 0.7)';
                ctx.lineWidth = r * 0.30;
                ctx.beginPath();
                ctx.ellipse(x, y, r * 1.75, r * 0.55, -0.32, 0, Math.PI);
                ctx.stroke();
            }

            // Mono-label som resten af UI'et
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.font = '700 10px "Space Mono", monospace';
            ctx.textAlign = x > W / 2 ? 'right' : 'left';
            var lx = x > W / 2 ? x - (p.ring ? r * 2 : r) - 12 : x + (p.ring ? r * 2 : r) + 12;
            ctx.fillText(p.name, lx, y + 3);
        }

        function drawPlanets(scroll) {
            var vmin = Math.min(W, H);
            var S = journeyEnd;
            for (var i = 0; i < PLANETS.length; i++) {
                var p = PLANETS[i];
                var r = p.r * vmin;
                var worldY = H * 0.55 + p.s0 * S * p.pf;
                var y = worldY - scroll * p.pf;
                if (y < -r * 3 || y > H + r * 3) continue;
                drawPlanet(p, p.px * W, y, r);
            }
        }

        // Statisk opstilling naar reduced motion er slaaet til
        function drawPlanetsStatic() {
            var vmin = Math.min(W, H);
            drawPlanet(PLANETS[5], W * 0.85, H * 0.20, 0.05 * vmin);  // Saturn
            drawPlanet(PLANETS[3], W * 0.12, H * 0.72, 0.025 * vmin); // Mars
            drawPlanet(PLANETS[2], W * 0.90, H * 0.82, 0.03 * vmin);  // Jorden
        }

        function drawStars(scroll, time) {
            ctx.clearRect(0, 0, W, H);
            for (var li = 0; li < layers.length; li++) {
                var layer = layers[li];
                var def = layer.def;
                var offset = scroll * def.parallax;
                for (var i = 0; i < layer.stars.length; i++) {
                    var st = layer.stars[i];
                    var y = (st.y - offset) % H;
                    if (y < 0) y += H;
                    var tw = reduced ? 1 : 0.65 + 0.35 * Math.sin(time * 0.001 * st.speed + st.phase);
                    ctx.globalAlpha = def.alpha * tw;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(st.x, y, st.r, 0, 6.2832);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            if (reduced) {
                drawPlanetsStatic();
            } else {
                drawPlanets(scroll);
            }
        }

        /* ============ Bogstav-rejsen ============ */
        var journey = document.querySelector('.journey');
        var hint = document.getElementById('hint');
        var letters = [];
        var journeyEnd = 1;

        // Scroll-vinduer pr. ord (andel af rejsen)
        var WINDOWS = [
            [0.03, 0.30],
            [0.36, 0.62],
            [0.68, 0.90]
        ];

        function splitLetters() {
            var words = document.querySelectorAll('#stageName .word');
            var idx = 0;
            words.forEach(function (word, wi) {
                var chars = Array.from(word.textContent);
                word.textContent = '';
                var n = chars.length;
                chars.forEach(function (ch, ci) {
                    var span = document.createElement('span');
                    span.className = 'ltr';
                    span.textContent = ch;
                    word.appendChild(span);
                    var w0 = WINDOWS[wi][0], w1 = WINDOWS[wi][1];
                    var range = w1 - w0;
                    var seed = idx * 13 + 5;
                    var angle = rand(seed + 1) * Math.PI * 2;
                    var vmax = Math.max(window.innerWidth, window.innerHeight);
                    letters.push({
                        el: span,
                        t0: w0 + (ci / n) * range * 0.65,
                        dur: range * 0.35,
                        dx: Math.cos(angle) * (0.55 + rand(seed + 2) * 0.7) * vmax,
                        dy: Math.sin(angle) * (0.55 + rand(seed + 3) * 0.7) * vmax,
                        scale: 0.3 + rand(seed + 4) * 2.4,
                        rot: (rand(seed + 5) - 0.5) * 90,
                        last: -1
                    });
                    idx++;
                });
                // Ordet var skjult indtil bogstaverne er splittet
                word.style.visibility = 'visible';
            });
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function updateLetters(p) {
            for (var i = 0; i < letters.length; i++) {
                var l = letters[i];
                var t = (p - l.t0) / l.dur;
                t = t < 0 ? 0 : t > 1 ? 1 : t;
                if (t === l.last) continue;
                l.last = t;
                var e = easeOutCubic(t);
                var inv = 1 - e;
                l.el.style.transform = 'translate3d(' + (l.dx * inv).toFixed(1) + 'px,' +
                    (l.dy * inv).toFixed(1) + 'px,0) rotate(' + (l.rot * inv).toFixed(2) + 'deg) scale(' +
                    (l.scale + (1 - l.scale) * e).toFixed(3) + ')';
                l.el.style.opacity = Math.min(1, e * 1.8).toFixed(3);
            }
            if (hint) hint.style.opacity = p > 0.02 ? '0' : '1';
        }

        /* ============ Loop (rAF, passive scroll) ============ */
        var scrollPos = window.scrollY || 0;
        var dirty = true;

        function measure() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = Math.round(W * dpr);
            canvas.height = Math.round(H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            buildStars();
            if (journey) journeyEnd = Math.max(1, journey.offsetHeight - H);
            dirty = true;
        }

        window.addEventListener('scroll', function () {
            scrollPos = window.scrollY;
            dirty = true;
        }, { passive: true });

        window.addEventListener('resize', measure, { passive: true });

        measure();

        /* ============ Finale-reveal ============ */
        var reveals = document.querySelectorAll('.reveal');
        if (!reduced && 'IntersectionObserver' in window) {
            var io = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in');
                        io.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.25 });
            reveals.forEach(function (el) { io.observe(el); });
        } else {
            reveals.forEach(function (el) { el.classList.add('in'); });
        }

        /* ============ UFO-cursor ============ */
        var ufo = document.getElementById('ufo');
        var finePointer = window.matchMedia('(pointer: fine)').matches;
        var ufoX = -100, ufoY = -100, targetX = -100, targetY = -100, ufoTilt = 0;

        if (!reduced && finePointer && ufo) {
            document.documentElement.classList.add('ufo-on');
            document.addEventListener('mousemove', function (e) {
                targetX = e.clientX;
                targetY = e.clientY;
                if (!ufo.classList.contains('live')) {
                    ufoX = targetX; ufoY = targetY;
                    ufo.classList.add('live');
                }
            }, { passive: true });

            // Tractor beam over links
            document.querySelectorAll('a').forEach(function (el) {
                el.addEventListener('mouseenter', function () { ufo.classList.add('zap'); });
                el.addEventListener('mouseleave', function () { ufo.classList.remove('zap'); });
            });
        }

        function updateUfo() {
            var dx = targetX - ufoX;
            ufoX += dx * 0.18;
            ufoY += (targetY - ufoY) * 0.18;
            var tilt = Math.max(-22, Math.min(22, dx * 0.6));
            ufoTilt += (tilt - ufoTilt) * 0.15;
            ufo.style.transform = 'translate3d(' + (ufoX - 24).toFixed(1) + 'px,' +
                (ufoY - 18).toFixed(1) + 'px,0) rotate(' + ufoTilt.toFixed(2) + 'deg)';
        }

        if (reduced) {
            // Statisk: ét frame, ingen bevægelse, ingen rejse (skjult via CSS)
            drawStars(0, 0);
            window.addEventListener('resize', function () { drawStars(0, 0); }, { passive: true });
        } else {
            splitLetters();
            updateLetters(0);
            var ufoActive = finePointer && ufo;
            (function frame(time) {
                drawStars(scrollPos, time);
                if (dirty) {
                    dirty = false;
                    var p = scrollPos / journeyEnd;
                    updateLetters(p < 0 ? 0 : p > 1 ? 1 : p);
                }
                if (ufoActive) updateUfo();
                requestAnimationFrame(frame);
            })(0);
        }
    })();
    </script>
</body>
</html>
