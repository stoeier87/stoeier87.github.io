<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phobos Lander</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="phobos-lander.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div class="hud">
      <a href="../index.html">← Arcade</a>
      <div>Score: <span id="score">0</span></div>
      <div>Fuel: <span id="fuel">100</span>%</div>
    </div>
    <div class="controls" id="controls">
      <button id="thrust" aria-label="Thrust">THRUST</button>
      <div class="dpad-row">
        <button id="left" aria-label="Rotate left">↺</button>
        <button id="right" aria-label="Rotate right">↻</button>
      </div>
    </div>
    <script type="module" src="phobos-lander.js"></script>
  </body>
</html>
